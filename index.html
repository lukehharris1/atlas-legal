<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas — Legal</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #0f172a;
  --muted: #475569;
  --accent: #6366f1;
  --rule: #e2e8f0;
  --code-bg: #f1f5f9;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b1120;
    --fg: #e2e8f0;
    --muted: #94a3b8;
    --accent: #818cf8;
    --rule: #1e293b;
    --code-bg: #1e293b;
  }
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
    Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.65;
  margin: 0;
  padding: 0;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 56px 24px 96px;
}
h1 {
  font-size: 32px;
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}
h2 {
  font-size: 22px;
  margin: 48px 0 12px;
  letter-spacing: -0.01em;
}
p, li { color: var(--fg); }
.muted { color: var(--muted); }
strong { color: var(--fg); }
hr {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: 40px 0;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 15px;
}
th, td {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule);
}
th { font-weight: 600; }
em {
  display: block;
  margin-top: 24px;
  color: var(--muted);
  font-size: 14px;
  font-style: normal;
  border-top: 1px solid var(--rule);
  padding-top: 16px;
}
code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}
.nav {
  font-size: 14px;
  margin-bottom: 32px;
}
.nav a { margin-right: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./terms.html">Terms of Service</a>
    <a href="./index.html">Atlas</a>
  </div>
  
<h1>Atlas — Legal</h1>
<p class="muted">Atlas is a personal health-tracking iOS app. The links below are the public versions of our policies, mirrored from the App Store listing.</p>
<ul>
  <li><a href="./privacy.html">Privacy Policy</a></li>
  <li><a href="./terms.html">Terms of Service</a></li>
</ul>
<hr>
<p class="muted">Questions: <a href="mailto:support@atlashealth.app">support@atlashealth.app</a></p>

</div>
</body>
</html>
